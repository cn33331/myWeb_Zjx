# ==========================================
# Hub 平台 - 宝塔面板 Nginx 配置（80端口）
# ==========================================
# 使用说明：
# 1. 登录宝塔面板 -> 网站 -> 添加站点
# 2. 域名：服务器公网IP 或 域名
# 3. 根目录：/www/wwwroot/hub/vue-frontend/dist
# 4. 点击「设置」->「配置文件」
# 5. 替换为此文件内容
# ==========================================

server {
    listen 80;
    listen [::]:80;
    server_name 你的公网IP 你的域名 localhost;

    charset utf-8;
    client_max_body_size 50M;

    location /static/ {
        root /www/wwwroot/hub/hub;
        expires 30d;
    }

    location /media/ {
        root /www/wwwroot/hub/hub;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /www/wwwroot/hub/vue-frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/hub_access.log;
    error_log /www/wwwlogs/hub_error.log;
}
