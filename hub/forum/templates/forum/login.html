<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <style>
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray-bg: #F5F5F5;
            --gray-text: #999999;
            --gray-border: #E5E5E5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--white);
            color: var(--black);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .header {
            padding-bottom: 40px;
            border-bottom: 2px solid var(--black);
            margin-bottom: 60px;
        }

        .logo {
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--gray-text);
            font-weight: 400;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }

        .page-subtitle {
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 13px;
            color: var(--gray-text);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 12px;
            color: var(--gray-text);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 16px 0;
            font-size: 15px;
            border: none;
            border-bottom: 1px solid var(--gray-border);
            background: transparent;
            color: var(--black);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-bottom-color: var(--black);
        }

        .form-group input::placeholder {
            color: var(--gray-text);
            opacity: 0.6;
        }

        .error-message {
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 12px;
            color: #D63031;
            margin-bottom: 20px;
            padding: 12px;
            background: #FFF5F5;
            border-left: 2px solid #D63031;
        }

        .btn {
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 13px;
            color: var(--white);
            background: var(--black);
            border: none;
            padding: 16px 32px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
            width: 100%;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .footer-link {
            margin-top: 32px;
            text-align: center;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 13px;
        }

        .footer-link a {
            color: var(--black);
            text-decoration: none;
            border-bottom: 1px solid var(--black);
            padding-bottom: 2px;
        }

        .footer-link a:hover {
            opacity: 0.5;
        }

        .admin-hint {
            margin-top: 20px;
            text-align: center;
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 11px;
            color: var(--gray-text);
            letter-spacing: 0.05em;
        }

        .footer {
            margin-top: 80px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-border);
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 11px;
            color: var(--gray-text);
            letter-spacing: 0.05em;
        }

        @media (max-width: 640px) {
            .container { padding: 40px 20px; }
            .page-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">FORUM<span></span></div>
        </div>

        <h1 class="page-title">登录</h1>
        <p class="page-subtitle">// sign in to your account</p>

        {% if error_message %}
            <div class="error-message">{{ error_message }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>USERNAME</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn">LOGIN</button>
        </form>

        <div class="footer-link">
            <a href="{% url 'forum_register' %}">还没有账号？注册 →</a>
        </div>

        <div class="admin-hint">
            // 管理员可直接使用 admin 账号登录
        </div>

        <div class="footer">
            FORUM / Django
        </div>
    </div>
</body>
</html>
