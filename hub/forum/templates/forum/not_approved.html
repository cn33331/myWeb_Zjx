<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOT APPROVED</title>
    <style>
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray-bg: #F5F5F5;
            --gray-text: #999999;
            --gray-border: #E5E5E5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--white);
            color: var(--black);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 80px 40px;
            text-align: center;
        }

        .logo {
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 60px;
        }

        .logo span {
            color: var(--gray-text);
            font-weight: 400;
        }

        .warning-icon {
            font-size: 64px;
            margin-bottom: 32px;
            color: #E67E22;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        .page-subtitle {
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 13px;
            color: var(--gray-text);
            margin-bottom: 48px;
            line-height: 1.6;
        }

        .btn {
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 13px;
            color: var(--white);
            background: var(--black);
            border: none;
            padding: 16px 32px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .footer {
            margin-top: 80px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-border);
            font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
            font-size: 11px;
            color: var(--gray-text);
            letter-spacing: 0.05em;
        }

        @media (max-width: 640px) {
            .container { padding: 40px 20px; }
            .page-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">FORUM<span></span></div>

        <div class="warning-icon">!</div>
        <h1 class="page-title">账号未审核</h1>
        <p class="page-subtitle">// your account is not approved yet<br>please wait for admin review</p>

        <a href="{% url 'forum_home' %}" class="btn">GO TO HOME</a>

        <div class="footer">
            FORUM / Django
        </div>
    </div>
</body>
</html>
